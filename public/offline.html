<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8f3e8" />
    <title>Lumen — Offline</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: linear-gradient(180deg, #fbf7ef 0%, #f8f3e8 55%, #f3ead8 100%); color: #1e252b; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; }
      main { max-width: 34rem; }
      h1 { margin: 0 0 12px; font-size: clamp(2.4rem, 14vw, 4.2rem); line-height: .92; letter-spacing: -.08em; }
      p { margin: 0 0 14px; color: #68727d; font-size: 1.05rem; }
      a { color: #5d3711; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>接続がないため、このページを読み込めません。以前に開いたページは端末に保存されている場合があります。</p>
      <p><a href="/">ホームに戻る</a></p>
    </main>
  </body>
</html>
